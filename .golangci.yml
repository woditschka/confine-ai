version: "2"

run:
  timeout: 5m

linters:
  # Keep this list sorted alphabetically.
  enable:
    - errcheck
    - errorlint
    - gocritic
    - godot
    - govet
    - ineffassign
    - misspell
    - modernize
    - nilnesserr
    - perfsprint
    - predeclared
    - revive
    - sloglint
    - staticcheck
    - unconvert
    - unused
    - usestdlibvars
    - whitespace

  exclusions:
    rules:
      - linters:
          - errcheck
        path: _test.go
      - linters:
          - godot
        source: "^// ==="
    warn-unused: true

  settings:
    errcheck:
      exclude-functions:
        - io.Copy
        - fmt.Fprintf
        - fmt.Fprintln
        - (net/http.ResponseWriter).Write
        - (*encoding/json.Encoder).Encode
    govet:
      disable:
        - shadow
        - fieldalignment
      enable-all: true
    modernize:
      disable:
        - omitzero
        - waitgroup
    perfsprint:
      int-conversion: true
      err-error: true
      errorf: true
      sprintf1: true
      strconcat: false
      concat-loop: false
    revive:
      rules:
        - name: blank-imports
        - name: comment-spacings
        - name: context-as-argument
          arguments:
            - allowTypesBefore: '*testing.T,testing.TB'
        - name: context-keys-type
        - name: dot-imports
        - name: early-return
          arguments:
            - "preserveScope"
        - name: empty-block
          disabled: true
        - name: error-naming
        - name: error-return
        - name: error-strings
        - name: errorf
        - name: increment-decrement
        - name: indent-error-flow
          arguments:
            - "preserveScope"
        - name: range
        - name: receiver-naming
        - name: redefines-builtin-id
        - name: superfluous-else
          arguments:
            - "preserveScope"
        - name: time-naming
        - name: unexported-return
        - name: unreachable-code
        - name: unused-parameter
        - name: unused-receiver
        - name: var-declaration
        - name: var-naming

output:
  show-stats: false
